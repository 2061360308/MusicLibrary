name: Build Libraries and Create Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            architecture: x64
            preset: windows-x64-vcpkg
          - os: windows-latest
            platform: windows
            architecture: x86
            preset: windows-x86-vcpkg
          - os: windows-11-arm
            platform: windows
            architecture: arm64
            preset: windows-arm64-vcpkg
          - os: ubuntu-latest
            platform: linux
            architecture: x64
            preset: linux-x64-gcc
          - os: ubuntu-24.04-arm
            platform: linux
            architecture: arm64
            preset: linux-arm64-gcc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          architecture: ${{ matrix.architecture }}
          cache: "pnpm"
      
      - name: Pull NCM project submodule
        run: node scripts/pull_ncm.js

      - name: Install dependencies
        run: pnpm install

      - name: Build JavaScript bundle
        run: npx webpack

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xz-utils \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            libuv1-dev

      - name: Setup vcpkg (Windows)
        if: matrix.platform == 'windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg

      - name: Install vcpkg dependencies (Windows)
        if: matrix.platform == 'windows' && matrix.architecture == 'x86'
        run: vcpkg install --triplet x86-windows
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build qjsc target
        run: cmake --build --preset ${{ matrix.preset }}-Release --target qjsc

      - name: Build main target
        run: cmake --build --preset ${{ matrix.preset }}-Release${{ matrix.platform == 'linux' && ' -j$(nproc)' || '' }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.architecture }}-release
          path: |
            build/${{ matrix.platform }}/${{ matrix.architecture }}/${{ matrix.preset }}/Release/lib/**
            build/${{ matrix.platform }}/${{ matrix.architecture }}/${{ matrix.preset }}/Release/include/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-release
          path: artifacts/windows-x64

      - name: Download Windows x86 artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-x86-release
          path: artifacts/windows-x86

      - name: Download Windows arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-arm64-release
          path: artifacts/windows-arm64

      - name: Download Linux x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-release
          path: artifacts/linux-x64

      - name: Download Linux arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-release
          path: artifacts/linux-arm64

      - name: Zip Windows x64 artifacts
        run: cd artifacts/windows-x64 && zip -r ../windows-x64.zip ./*

      - name: Zip Windows x86 artifacts
        run: cd artifacts/windows-x86 && zip -r ../windows-x86.zip ./*

      - name: Zip Windows arm64 artifacts
        run: cd artifacts/windows-arm64 && zip -r ../windows-arm64.zip ./*

      - name: Zip Linux x64 artifacts
        run: cd artifacts/linux-x64 && zip -r ../linux-x64.zip ./*

      - name: Zip Linux arm64 artifacts
        run: cd artifacts/linux-arm64 && zip -r ../linux-arm64.zip ./*

      - name: Generate release body
        run: |
          cat << 'EOF' > release_body.md
          ## Pre-built Libraries

          ### Windows Libraries

          | Platform | Description |
          |----------|-------------|
          | windows-x64 | 64-bit Windows (Windows 10/11 x64) |
          | windows-x86 | 32-bit Windows (Windows 10/11 x86) |
          | windows-arm64 | Windows on ARM (Windows 11 ARM) |

          ### Linux Libraries

          | Platform | Description |
          |----------|-------------|
          | linux-x64 | 64-bit Linux (Ubuntu 20.04+) |
          | linux-arm64 | ARM64 Linux (Ubuntu 24.04 ARM) |

          Each platform zip contains:
          - `lib/` - Compiled library files (.lib, .dll, .so)
          - `include/` - Header files
          EOF
          cat release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.zip
          body_path: release_body.md
          generate_release_notes: true