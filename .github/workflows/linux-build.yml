name: Linux Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        architecture: [x64, arm64]
        exclude:
          - os: ubuntu-latest
            architecture: arm64
          - os: ubuntu-24.04-arm
            architecture: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          architecture: ${{ matrix.architecture }}
          cache: "pnpm"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xz-utils \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            libuv1-dev

      - name: Pull NCM project submodule
        run: node scripts/pull_ncm.js

      - name: Install dependencies
        run: pnpm install

      - name: Build JavaScript bundle
        run: npx webpack

      - name: Configure CMake
        run: cmake --preset linux-${{ matrix.architecture }}-gcc

      - name: Build qjsc target
        run: cmake --build --preset linux-${{ matrix.architecture }}-gcc-Release --target qjsc

      - name: Build main target
        run: cmake --build --preset linux-${{ matrix.architecture }}-gcc-Release -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.architecture }}-release
          path: |
            build/linux/${{ matrix.architecture }}/linux-${{ matrix.architecture }}-gcc/Release/lib/**
            build/linux/${{ matrix.architecture }}/linux-${{ matrix.architecture }}-gcc/Release/include/*
